<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.input-group{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    padding:8px 12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    padding:0;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px;
    border-bottom:1px solid #eee;
}

.delete-btn{
    background:#dc3545;
}

.delete-btn:hover{
    background:#a71d2a;
}

.count{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>Task Manager</h2>

<div class="input-group">
<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<p class="count">Total Tasks: <span id="count">0</span></p>

</div>

<script>

function addTask(){

    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();

    if(taskText === ""){
        alert("Please enter something");
        return;
    }

    const li = document.createElement("li");
    li.textContent = taskText;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "delete-btn";

    deleteBtn.onclick = function(){
        li.remove();
        updateCount();
    };

    li.appendChild(deleteBtn);

    document.getElementById("taskList").appendChild(li);

    input.value = "";

    updateCount();
}

function updateCount(){
    const total = document.querySelectorAll("#taskList li").length;
    document.getElementById("count").textContent = total;
}

</script>

</body>
</html>
